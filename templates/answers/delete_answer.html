{% extends "base.html" %}
{% block title %}Delete Answer — Spendly{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Delete Answer</h1>
            <p class="auth-subtitle">This action cannot be undone</p>
        </div>
        <div class="auth-card">
            <p class="confirm-text">Are you sure you want to delete <strong>{{ answer.short_desc }}</strong>?</p>
            <form method="POST" action="{{ url_for('delete_answer_route', id=answer.id) }}">
                <button type="submit" class="btn-submit-danger">Delete Answer</button>
            </form>
        </div>
        <p class="auth-switch"><a href="{{ url_for('answers') }}">Cancel — back to answers</a></p>
    </div>
</section>
{% endblock %}
