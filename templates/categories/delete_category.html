{% extends "base.html" %}

{% block title %}Delete Category — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Delete Category</h1>
            <p class="auth-subtitle">This action cannot be undone</p>
        </div>

        <div class="auth-card">
            <p class="confirm-text">
                Are you sure you want to delete the category
                <strong>{{ category.name }}</strong>?
            </p>
            <form method="POST" action="{{ url_for('delete_category_route', id=category.id) }}">
                <button type="submit" class="btn-submit-danger">Delete Category</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('categories') }}">Cancel — back to categories</a>
        </p>

    </div>
</section>

{% endblock %}
